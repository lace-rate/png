<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Toggle</title>
    <style>
        .image-container {
            text-align: center;
        }
        img {
            display: none;
        }
        img:first-of-type {
            display: block;
        }
    </style>
</head>
<body>

<div class="image-container">
    <img src="https://github.com/lace-rate/png/blob/main/%EB%A7%88%EB%A1%B1/%EB%B3%84%EA%B1%B1%EC%A0%95%EC%9D%84.png?raw=true" onclick="toggleImage()">
    <img src="https://github.com/lace-rate/png/blob/main/%EB%A7%88%EB%A1%B1/%EB%A7%88%EB%A1%B1.png?raw=true" onclick="toggleImage()">
</div>

<script>
    let currentIndex = 0;
    const images = document.querySelectorAll('img');

    function toggleImage() {
        images[currentIndex].style.display = 'none';
        currentIndex = (currentIndex + 1) % images.length;
        images[currentIndex].style.display = 'block';
    }
</script>

</body>
</html>
